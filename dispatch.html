<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>雅偲科技-大園蝦皮</title>

<style>

body{
font-family:-apple-system;
background:#f3f4f6;
margin:0;
padding:15px;
}

.container{
max-width:420px;
margin:auto;
}

h2{
text-align:center;
margin-bottom:10px;
}

button{
border:none;
border-radius:6px;
padding:10px;
font-size:14px;
}

.add{
background:#16a34a;
color:white;
width:100%;
margin-bottom:10px;
}

table{
width:100%;
border-collapse:collapse;
background:white;
border-radius:8px;
overflow:hidden;
font-size:14px;
}

th{
background:#1f2937;
color:white;
padding:8px;
}

td{
padding:6px;
border-bottom:1px solid #eee;
text-align:center;
}

input{
width:100%;
border:none;
text-align:center;
font-size:14px;
}

.delete{
background:#dc2626;
color:white;
padding:6px 8px;
font-size:12px;
}

.total{
background:#f9fafb;
font-weight:bold;
}

</style>

</head>

<body>

<div class="container">

<h2>雅偲科技-大園蝦皮</h2>

<button class="add" onclick="addRow()">新增紀錄</button>

<table>

<thead>
<tr>
<th>日期</th>
<th>工數</th>
<th>金額</th>
<th></th>
</tr>
</thead>

<tbody id="tbody"></tbody>

<tfoot>
<tr class="total">
<td>合計</td>
<td id="totalWork">0</td>
<td id="totalMoney">0</td>
<td></td>
</tr>
</tfoot>

</table>

</div>

<script>

let data=[]

function save(){
localStorage.setItem("dispatchData",JSON.stringify(data))
}

function load(){

let saved=localStorage.getItem("dispatchData")

if(saved){
data=JSON.parse(saved)
data.forEach(addRowFromData)
}

calculate()
}

function addRow(){

let rowData={
date:"",
work:0,
money:0
}

data.push(rowData)

addRowFromData(rowData)

save()
}

function addRowFromData(rowData){

let tbody=document.getElementById("tbody")

let row=document.createElement("tr")

row.innerHTML=`
<td><input type="date" value="${rowData.date}"></td>
<td><input type="number" value="${rowData.work}"></td>
<td><input type="number" value="${rowData.money}"></td>
<td><button class="delete">刪除</button></td>
`

tbody.appendChild(row)

let inputs=row.querySelectorAll("input")

inputs.forEach((input,index)=>{

input.onchange=function(){

rowData.date=inputs[0].value
rowData.work=Number(inputs[1].value)
rowData.money=Number(inputs[2].value)

calculate()
save()

}

})

row.querySelector(".delete").onclick=function(){

row.remove()

data=data.filter(d=>d!==rowData)

calculate()
save()

}

}

function calculate(){

let totalWork=0
let totalMoney=0

data.forEach(d=>{

totalWork+=Number(d.work)||0
totalMoney+=Number(d.money)||0

})

document.getElementById("totalWork").innerText=totalWork
document.getElementById("totalMoney").innerText=totalMoney

}

load()

</script>

</body>
</html>
