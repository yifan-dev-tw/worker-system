<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>派工系統</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#f3f4f6;
}

.container{
  max-width:900px;
  margin:20px auto;
  padding:10px;
}

.card{
  background:#fff;
  padding:18px;
  border-radius:10px;
  margin-bottom:16px;
}

.form{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:10px;
}

.full{
  grid-column:1/3;
}

input,select{
  padding:10px;
}

button{
  padding:10px;
  background:#111;
  color:white;
  border:none;
  border-radius:6px;
}

table{
  width:100%;
  border-collapse:collapse;
  margin-top:10px;
}

th,td{
  border:1px solid #ddd;
  padding:8px;
  text-align:center;
}

.plus{color:green;}
.minus{color:red;}

@media(max-width:600px){
  .form{grid-template-columns:1fr;}
  .full{grid-column:1;}
}
</style>
</head>

<body>

<div class="container">

<!-- 新增員工 -->
<div class="card">
<h2>新增員工</h2>
<div class="form">
<input id="name" placeholder="姓名">
<input id="phone" placeholder="電話">
<button class="full" onclick="addWorker()">新增</button>
</div>
</div>

<!-- 員工 -->
<div class="card">
<h2>員工列表</h2>
<div id="workerList"></div>
</div>

<!-- 派工 -->
<div class="card">
<h2>派工 + 評分</h2>

<div class="form">
<select id="dispatchName"></select>
<input id="location" placeholder="工作地點">
<input id="date" type="date">

<select id="action">
<option value="2">完成派工 +2</option>
<option value="1">準時 +1</option>
<option value="-3">遲到 -3</option>
<option value="-10">未到 -10</option>
<option value="-1">請假 -1</option>
<option value="-5">臨時取消 -5</option>
</select>

<button class="full" onclick="addDispatch()">送出</button>
</div>

</div>

<!-- 派工紀錄 -->
<div class="card">
<h2>派工紀錄</h2>
<div id="dispatchList"></div>
</div>

<!-- 評分紀錄 -->
<div class="card">
<h2>評分紀錄</h2>
<div id="scoreList"></div>
</div>

</div>

<script>

/* 新增員工 */
function addWorker(){
  const name = document.getElementById("name").value;
  const phone = document.getElementById("phone").value;

  if(!name) return alert("請輸入姓名");

  let workers = JSON.parse(localStorage.getItem("workers")) || [];

  workers.push({name,phone,score:0});
  localStorage.setItem("workers", JSON.stringify(workers));

  renderWorkers();
  loadSelect();
}

/* 員工列表 */
function renderWorkers(){
  let workers = JSON.parse(localStorage.getItem("workers")) || [];

  let html = `<table>
  <tr><th>姓名</th><th>電話</th><th>分數</th></tr>`;

  workers.forEach(w=>{
    html += `<tr>
    <td>${w.name}</td>
    <td>${w.phone}</td>
    <td>${w.score}</td>
    </tr>`;
  });

  html += "</table>";
  document.getElementById("workerList").innerHTML = html;
}

/* 下拉 */
function loadSelect(){
  let workers = JSON.parse(localStorage.getItem("workers")) || [];
  let select = document.getElementById("dispatchName");

  select.innerHTML = "";

  workers.forEach(w=>{
    let op = document.createElement("option");
    op.value = w.name;
    op.textContent = w.name;
    select.appendChild(op);
  });
}

/* 派工 + 評分 */
function addDispatch(){
  const name = document.getElementById("dispatchName").value;
  const location = document.getElementById("location").value;
  const date = document.getElementById("date").value;
  const scoreChange = parseInt(document.getElementById("action").value);
  const actionText = document.getElementById("action").selectedOptions[0].text;

  if(!name || !location || !date){
    return alert("請填完整");
  }

  // 派工
  let dispatch = JSON.parse(localStorage.getItem("dispatch")) || [];
  dispatch.push({name,location,date});
  localStorage.setItem("dispatch", JSON.stringify(dispatch));

  // 評分
  let workers = JSON.parse(localStorage.getItem("workers")) || [];
  workers.forEach(w=>{
    if(w.name === name){
      w.score += scoreChange;
      if(w.score < 0) w.score = 0;
      if(w.score > 100) w.score = 100;
    }
  });
  localStorage.setItem("workers", JSON.stringify(workers));

  // 評分紀錄
  let scores = JSON.parse(localStorage.getItem("scores")) || [];
  scores.push({
    name,
    action: actionText,
    score: scoreChange,
    date
  });
  localStorage.setItem("scores", JSON.stringify(scores));

  renderWorkers();
  renderDispatch();
  renderScore();
}

/* 派工列表 */
function renderDispatch(){
  let list = JSON.parse(localStorage.getItem("dispatch")) || [];

  let html = `<table>
  <tr><th>姓名</th><th>地點</th><th>日期</th></tr>`;

  list.forEach(d=>{
    html += `<tr>
    <td>${d.name}</td>
    <td>${d.location}</td>
    <td>${d.date}</td>
    </tr>`;
  });

  html += "</table>";
  document.getElementById("dispatchList").innerHTML = html;
}

/* 評分紀錄 */
function renderScore(){
  let list = JSON.parse(localStorage.getItem("scores")) || [];

  let html = `<table>
  <tr><th>姓名</th><th>動作</th><th>分數</th><th>日期</th></tr>`;

  list.forEach(s=>{
    html += `<tr>
    <td>${s.name}</td>
    <td>${s.action}</td>
    <td class="${s.score>0?'plus':'minus'}">${s.score}</td>
    <td>${s.date}</td>
    </tr>`;
  });

  html += "</table>";
  document.getElementById("scoreList").innerHTML = html;
}

/* 初始化 */
window.onload = function(){
  renderWorkers();
  renderDispatch();
  renderScore();
  loadSelect();
}

</script>

</body>
</html>
