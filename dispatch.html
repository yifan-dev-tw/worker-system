<!DOCTYPE html>
<html>
<head>

<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>雅偲科技-大園蝦皮</title>

<style>

body{
font-family:-apple-system;
background:#f3f4f6;
padding:15px;
}

.container{
max-width:420px;
margin:auto;
}

h2{
text-align:center;
margin-bottom:15px;
}

.card{
background:white;
padding:15px;
border-radius:10px;
margin-bottom:15px;
}

.form-row{
display:grid;
grid-template-columns:1.5fr 1fr;
gap:8px;
margin-bottom:10px;
}

input{
width:100%;
padding:10px;
border:1px solid #ddd;
border-radius:6px;
font-size:14px;
}

button{
width:100%;
padding:10px;
background:#16a34a;
color:white;
border:none;
border-radius:6px;
font-size:14px;
}

table{
width:100%;
border-collapse:collapse;
font-size:14px;
}

th{
background:#1f2937;
color:white;
padding:8px;
}

td{
padding:8px;
border-bottom:1px solid #eee;
text-align:center;
}

.delete{
background:#dc2626;
padding:4px 8px;
font-size:12px;
border-radius:4px;
color:white;
border:none;
}

.total{
font-weight:bold;
background:#f9fafb;
}

</style>

</head>

<body>

<div class="container">

<h2>雅偲科技-大園蝦皮</h2>

<div class="card">

<div class="form-row">

<input type="date" id="date">

<input type="number" id="work" placeholder="工數">

</div>

<button onclick="addRecord()">新增記錄</button>

</div>

<div class="card">

<table>

<thead>

<tr>
<th>日期</th>
<th>工數</th>
<th>金額</th>
<th></th>
</tr>

</thead>

<tbody id="records"></tbody>

<tfoot>

<tr class="total">
<td>合計</td>
<td id="totalWork">0</td>
<td id="totalMoney">0</td>
<td></td>
</tr>

</tfoot>

</table>

</div>

</div>

<script>

let price = 200

let data=[]

function save(){

localStorage.setItem("dispatchData",JSON.stringify(data))

}

function load(){

let saved=localStorage.getItem("dispatchData")

if(saved){

data=JSON.parse(saved)

render()

}

}

function addRecord(){

let date=document.getElementById("date").value

let work=document.getElementById("work").value

if(!date || !work) return

let money = work * price

let record={

date:date,
work:Number(work),
money:money

}

data.push(record)

render()

save()

document.getElementById("work").value=""

}

function deleteRecord(index){

data.splice(index,1)

render()

save()

}

function render(){

let tbody=document.getElementById("records")

tbody.innerHTML=""

let totalWork=0
let totalMoney=0

data.forEach((r,i)=>{

totalWork+=r.work
totalMoney+=r.money

tbody.innerHTML+=`

<tr>
<td>${r.date}</td>
<td>${r.work}</td>
<td>${r.money}</td>
<td>
<button class="delete" onclick="deleteRecord(${i})">刪除</button>
</td>
</tr>

`

})

document.getElementById("totalWork").innerText=totalWork
document.getElementById("totalMoney").innerText=totalMoney

}

load()

</script>

</body>

</html>
