<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<title>雅偲科技-大園蝦皮 派工記錄</title>

<style>
body{
font-family: Arial;
background:#f5f6f7;
padding:30px;
}

h2{
text-align:center;
}

table{
border-collapse:collapse;
width:100%;
background:white;
}

th,td{
border:1px solid #ddd;
padding:10px;
text-align:center;
}

th{
background:#2c3e50;
color:white;
}

button{
padding:6px 12px;
border:none;
border-radius:4px;
cursor:pointer;
}

.add{
background:#27ae60;
color:white;
margin-bottom:10px;
}

.delete{
background:#e74c3c;
color:white;
}

.total{
background:#ecf0f1;
font-weight:bold;
}

input{
width:100%;
border:none;
text-align:center;
}
</style>

</head>

<body>

<h2>雅偲科技-大園蝦皮 派工記錄</h2>

<button class="add" onclick="addRow()">新增記錄</button>

<table id="table">

<thead>
<tr>
<th>日期</th>
<th>工數</th>
<th>金額</th>
<th>操作</th>
</tr>
</thead>

<tbody id="tbody">
</tbody>

<tfoot>
<tr class="total">
<td>合計</td>
<td id="totalWork">0</td>
<td id="totalMoney">0</td>
<td></td>
</tr>
</tfoot>

</table>

<script>

function addRow(){

let tbody=document.getElementById("tbody")

let row=document.createElement("tr")

row.innerHTML=`
<td><input type="date"></td>
<td><input type="number" onchange="calculate()"></td>
<td><input type="number" onchange="calculate()"></td>
<td><button class="delete" onclick="deleteRow(this)">刪除</button></td>
`

tbody.appendChild(row)

}

function deleteRow(btn){

btn.parentNode.parentNode.remove()

calculate()

}

function calculate(){

let works=document.querySelectorAll("tbody tr td:nth-child(2) input")
let moneys=document.querySelectorAll("tbody tr td:nth-child(3) input")

let totalWork=0
let totalMoney=0

works.forEach(w=>{
totalWork+=Number(w.value)||0
})

moneys.forEach(m=>{
totalMoney+=Number(m.value)||0
})

document.getElementById("totalWork").innerText=totalWork
document.getElementById("totalMoney").innerText=totalMoney

}

</script>

</body>
</html>
