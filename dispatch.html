<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>派工評分系統</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#f3f4f6;
}

.wrapper{
  max-width:900px;
  margin:30px auto;
  background:#fff;
  padding:20px;
  border-radius:10px;
}

h2{
  margin-top:0;
}

.row{
  display:flex;
  gap:10px;
  margin-bottom:10px;
}

input,select{
  flex:1;
  padding:8px;
}

button{
  padding:8px 12px;
  border:none;
  background:#111;
  color:#fff;
  border-radius:6px;
}

table{
  width:100%;
  border-collapse:collapse;
  margin-top:10px;
}

th,td{
  border:1px solid #ddd;
  padding:8px;
  text-align:center;
}
</style>
</head>

<body>

<div class="wrapper">

<h2>新增員工</h2>

<div class="row">
<input id="name" placeholder="姓名">
<input id="phone" placeholder="電話">
<button onclick="addWorker()">新增</button>
</div>

<h2>員工列表</h2>
<div id="workerList"></div>

<hr>

<h2>派工 + 評分</h2>

<div class="row">
<select id="dispatchName"></select>
<input id="location" placeholder="工作地點">
<input id="date" type="date">
</div>

<div class="row">
<select id="action">
<option value="2">完成派工 +2</option>
<option value="1">準時 +1</option>
<option value="-3">遲到 -3</option>
<option value="-10">未到 -10</option>
<option value="-1">請假 -1</option>
<option value="-5">臨時取消 -5</option>
</select>

<button onclick="addDispatch()">送出</button>
</div>

<h2>派工紀錄</h2>
<div id="dispatchList"></div>

</div>

<script>

/* ========= 新增員工 ========= */
function addWorker(){
  const name = document.getElementById("name").value;
  const phone = document.getElementById("phone").value;

  if(!name) return alert("請輸入姓名");

  let workers = JSON.parse(localStorage.getItem("workers")) || [];

  workers.push({
    name,
    phone,
    score:0
  });

  localStorage.setItem("workers", JSON.stringify(workers));

  renderWorkers();
  loadSelect();
}

/* ========= 顯示員工 ========= */
function renderWorkers(){
  let workers = JSON.parse(localStorage.getItem("workers")) || [];

  let html = `
  <table>
  <tr>
  <th>姓名</th>
  <th>電話</th>
  <th>分數</th>
  <th>操作</th>
  </tr>
  `;

  workers.forEach((w,i)=>{
    html += `
    <tr>
    <td>${w.name}</td>
    <td>${w.phone}</td>
    <td>${w.score}</td>
    <td>
      <button onclick="deleteWorker(${i})">刪除</button>
    </td>
    </tr>
    `;
  });

  html += "</table>";

  document.getElementById("workerList").innerHTML = html;
}

/* ========= 刪除員工 ========= */
function deleteWorker(i){
  let workers = JSON.parse(localStorage.getItem("workers")) || [];
  workers.splice(i,1);
  localStorage.setItem("workers", JSON.stringify(workers));
  renderWorkers();
  loadSelect();
}

/* ========= 下拉 ========= */
function loadSelect(){
  let workers = JSON.parse(localStorage.getItem("workers")) || [];
  let select = document.getElementById("dispatchName");

  select.innerHTML = "";

  workers.forEach(w=>{
    let op = document.createElement("option");
    op.value = w.name;
    op.textContent = w.name;
    select.appendChild(op);
  });
}

/* ========= 派工 + 評分 ========= */
function addDispatch(){
  const name = document.getElementById("dispatchName").value;
  const location = document.getElementById("location").value;
  const date = document.getElementById("date").value;
  const scoreChange = parseInt(document.getElementById("action").value);

  if(!name || !location || !date){
    return alert("請填完整");
  }

  let dispatch = JSON.parse(localStorage.getItem("dispatch")) || [];
  dispatch.push({name,location,date});
  localStorage.setItem("dispatch", JSON.stringify(dispatch));

  // 評分
  let workers = JSON.parse(localStorage.getItem("workers")) || [];

  workers.forEach(w=>{
    if(w.name === name){
      w.score += scoreChange;
      if(w.score < 0) w.score = 0;
      if(w.score > 100) w.score = 100;
    }
  });

  localStorage.setItem("workers", JSON.stringify(workers));

  renderWorkers();
  renderDispatch();
}

/* ========= 顯示派工 ========= */
function renderDispatch(){
  let list = JSON.parse(localStorage.getItem("dispatch")) || [];

  let html = `
  <table>
  <tr>
  <th>姓名</th>
  <th>地點</th>
  <th>日期</th>
  </tr>
  `;

  list.forEach(d=>{
    html += `
    <tr>
    <td>${d.name}</td>
    <td>${d.location}</td>
    <td>${d.date}</td>
    </tr>
    `;
  });

  html += "</table>";

  document.getElementById("dispatchList").innerHTML = html;
}

/* ========= 初始化 ========= */
window.onload = function(){
  renderWorkers();
  renderDispatch();
  loadSelect();
}

</script>

</body>
</html>
